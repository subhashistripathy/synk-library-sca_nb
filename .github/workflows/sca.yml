name: Snyk Open Source Dependency Scan (NO BLOCK)

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  snyk-sca:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate Snyk
        env:
          SNYK_TOKEN: c80a2012-bb87-4482-beb5-399c664f183d
        run: snyk auth "$SNYK_TOKEN"

      # 🔍 Snyk Open Source (Dependency / Library Scan)
      - name: Run Snyk SCA Scan (NO BLOCK)
        env:
          SNYK_TOKEN: c80a2012-bb87-4482-beb5-399c664f183d
        run: |
          snyk test \
            --all-projects \
            --sarif-file-output=snyk-sca.sarif || true

          ls -lh snyk-sca.sarif

      # 📤 Upload SARIF to GitHub Code Scanning
      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-sca.sarif
